<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#135bec",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style innerhtml="body { font-family: 'Inter', sans-serif; width: 360px; height: auto; max-height: 600px; overflow-x: hidden; overflow-y: auto; } .custom-scrollbar::-webkit-scrollbar { width: 4px; } .custom-scrollbar::-webkit-scrollbar-track { background: transparent; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }">
        body {
            font-family: 'Inter', sans-serif;
            width: 360px;
            height: 600px;
            overflow: hidden;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
<style>body { min-height: auto; }</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="flex flex-col h-full w-full">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-3 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 sticky top-0 z-10">
<div class="flex items-center gap-2">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-lg">auto_awesome</span>
</div>
<h1 class="font-bold text-base tracking-tight text-slate-900 dark:text-white">Mini Sterling</h1>
</div>
<div class="flex items-center gap-1"><button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors" title="History"><span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-[20px]">history</span></button><button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors" title="Vault"><span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-[20px]">folder</span></button>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-[20px]">help</span>
</button>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-[20px]">settings</span>
</button>
</div>
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4">
<!-- Drag & Drop Zone -->
<div class="relative group">
<div class="flex flex-col items-center justify-center gap-4 rounded-xl border-2 border-dashed border-primary/30 bg-primary/5 dark:bg-primary/10 px-6 py-10 transition-all hover:border-primary/60 hover:bg-primary/10 cursor-pointer">
<div class="flex flex-col items-center gap-3 text-center">
<div class="size-12 rounded-full bg-white dark:bg-slate-800 shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl">upload_file</span>
</div>
<div>
<p class="text-slate-900 dark:text-white font-semibold text-sm">Upload PDF</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Drag &amp; drop or click to browse</p>
</div>
</div>
<button class="flex items-center justify-center rounded-lg h-9 px-4 bg-primary text-white text-xs font-semibold shadow-sm hover:bg-primary/90 transition-colors">
                        Select File
                    </button>
</div>
</div>
<!-- Quick Actions Grid -->
<div>
<p class="text-slate-400 dark:text-slate-500 text-[11px] font-bold uppercase tracking-wider mb-3 px-1">Quick Actions</p>
<div class="grid grid-cols-3 gap-2">
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary/50 hover:shadow-sm transition-all text-center">
<span class="material-symbols-outlined text-primary text-xl">layers</span>
<span class="text-[11px] font-semibold text-slate-700 dark:text-slate-300">Merge</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary/50 hover:shadow-sm transition-all text-center">
<span class="material-symbols-outlined text-primary text-xl">edit_square</span>
<span class="text-[11px] font-semibold text-slate-700 dark:text-slate-300">Sign/Seal</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-primary/50 hover:shadow-sm transition-all text-center">
<span class="material-symbols-outlined text-primary text-xl">psychology</span>
<span class="text-[11px] font-semibold text-slate-700 dark:text-slate-300">AI Analysis</span>
</button>
</div>
</div>
<!-- Mini AI Assistant -->
<div class="flex flex-col gap-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 shadow-sm">
<div class="flex items-center gap-2 pb-2 border-b border-slate-100 dark:border-slate-800">
<span class="material-symbols-outlined text-primary text-sm">chat_bubble</span>
<span class="text-xs font-bold text-slate-800 dark:text-slate-200">Mini Assistant</span>
</div>
<div class="space-y-3 min-h-[60px]">
<div class="flex items-start gap-2">
<div class="size-6 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary text-[14px]">smart_toy</span>
</div>
<div class="bg-slate-50 dark:bg-slate-800/50 p-2.5 rounded-lg rounded-tl-none">
<p class="text-[12px] leading-relaxed text-slate-600 dark:text-slate-400">Hello! Upload a PDF and I can summarize it or extract data for you.</p>
</div>
</div>
</div>
<div class="relative mt-2">
<input class="w-full pl-3 pr-10 py-2.5 text-xs rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary dark:text-white transition-all" placeholder="Ask anything about your PDF..." type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-primary hover:text-primary/80 transition-colors">
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</div>
</div>
</main>
<!-- Bottom Nav Bar -->
</div>
</body></html>
