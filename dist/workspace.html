<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesa de Trabajo - Mini Sterling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="workspace.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand" aria-label="Marca">
        <div class="brand-row">
          <span class="material-symbols-outlined brand-icon">description</span>
          <h1>Sterling</h1>
        </div>
        <div id="doc-meta" class="doc-meta">
          <span id="doc-name">Documento activo</span>
          <span id="doc-stats">0 paginas</span>
        </div>
      </div>

      <div class="actions">
        <input id="merge-input" class="hidden-input" type="file" accept="application/pdf" multiple />
        <button id="merge-btn" type="button" class="tool-btn" title="Unir PDFs">
          <span class="material-symbols-outlined">attachment</span>
          <span>Unir PDFs</span>
        </button>
        <button id="add-image-btn" type="button" class="tool-btn" title="Agregar Imagen">
          <span class="material-symbols-outlined">image</span>
          <span>Agregar Imagen</span>
        </button>
        <button id="add-text-btn" type="button" class="tool-btn" title="Agregar Texto">
          <span class="material-symbols-outlined">text_fields</span>
          <span>Agregar Texto</span>
        </button>
      </div>

      <div class="topbar-primary-action">
        <button id="export-btn" type="button" class="export-btn">
          <span class="material-symbols-outlined">download</span>
          <span>Exportar</span>
        </button>
        <div id="export-name-popover" class="export-name-popover" hidden>
          <label for="export-name-input" class="export-name-label">Nombre del archivo</label>
          <input id="export-name-input" class="export-name-input" type="text" maxlength="120" />
          <div class="export-name-actions">
            <button id="export-cancel-btn" type="button" class="export-pop-btn ghost">Cancelar</button>
            <button id="export-confirm-btn" type="button" class="export-pop-btn">Guardar</button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace-layout">
      <aside class="pages-panel">
        <div class="pages-panel-head">
          <h2>Paginas</h2>
          <button id="toggle-pages-btn" type="button" class="pages-toggle-btn" title="Colapsar barra de paginas">
            <span class="material-symbols-outlined">left_panel_close</span>
          </button>
        </div>
        <div id="page-list" class="page-list"></div>
        <div id="pages-resizer" class="pages-resizer" title="Ajustar ancho"></div>
      </aside>

      <section class="canvas-panel">
        <div class="viewer-toolbar">
          <button id="prev-page-btn" type="button" class="ghost-btn">Anterior</button>
          <span id="page-indicator">Pagina 1 / 1</span>
          <button id="next-page-btn" type="button" class="ghost-btn">Siguiente</button>
        </div>
        <div class="canvas-center-wrap">
          <div class="canvas-stack">
            <canvas id="pdf-canvas"></canvas>
            <canvas id="overlay-canvas"></canvas>
          </div>
        </div>
      </section>

      <aside class="tools-panel">
        <div class="tool-tabs">
          <button id="tab-stamps" class="tab-btn active" type="button">Sellos Frecuentes</button>
          <button id="tab-ai" class="tab-btn" type="button">IA Chat</button>
        </div>

        <section id="stamps-panel" class="tool-panel active">
          <p class="panel-hint">Arrastra al documento para aplicar.</p>
          <input id="stamp-upload-input" class="hidden-input" type="file" accept="image/png,image/jpeg" />
          <button id="upload-stamp-btn" class="ghost-btn full-btn" type="button">Subir Imagen/Sello</button>
          <div id="stamp-library" class="stamp-library"></div>
        </section>

        <section id="ai-panel" class="tool-panel">
          <div class="ai-tools">
            <button id="summarize-ai-btn" type="button" class="ai-quick-btn">Resumir PDF</button>
            <button id="clear-ai-btn" type="button" class="ai-quick-btn ghost">Limpiar chat</button>
          </div>
          <div id="ai-messages" class="ai-messages"></div>
          <div class="ai-input-row">
            <textarea id="question-input" placeholder="Escribe tu pregunta..."></textarea>
            <button id="ask-ai-btn" type="button">Preguntar</button>
          </div>
        </section>
      </aside>
    </main>

    <p id="workspace-status" aria-live="polite"></p>
    <script src="workspace.js"></script>
  </body>
</html>
