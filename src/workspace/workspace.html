<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesa de Trabajo - PDFling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="workspace.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand" aria-label="Marca">
          <div class="brand-row">
            <span class="material-symbols-outlined brand-icon">auto_awesome</span>
            <h1>PDFling</h1>
          </div>
        </div>
        <div id="doc-meta" class="doc-meta">
          <span class="doc-chip-label">FILE:</span>
          <span id="doc-name">Documento activo</span>
          <span class="doc-chip-sep">|</span>
          <span id="doc-stats">0 paginas</span>
        </div>
      </div>

      <div class="topbar-primary-action">
        <button id="compress-btn" type="button" class="share-btn">
          <span class="material-symbols-outlined">compress</span>
          <span>Comprimir</span>
        </button>
        <button id="export-btn" type="button" class="export-btn">
          <span class="material-symbols-outlined">download</span>
          <span>Exportar</span>
        </button>
        <div id="export-name-popover" class="export-name-popover" hidden>
          <label for="export-name-input" class="export-name-label">Nombre del archivo</label>
          <input id="export-name-input" class="export-name-input" type="text" maxlength="120" />
          <div class="export-name-actions">
            <button id="export-cancel-btn" type="button" class="export-pop-btn ghost">Cancelar</button>
            <button id="export-confirm-btn" type="button" class="export-pop-btn">Guardar</button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace-layout">
      <aside class="pages-panel">
        <div class="pages-panel-head">
          <h2 id="pages-title">Pages</h2>
          <button id="toggle-pages-btn" type="button" class="pages-toggle-btn" title="Colapsar barra de paginas">
            <span class="material-symbols-outlined">left_panel_close</span>
          </button>
        </div>
        <div id="page-list" class="page-list"></div>
        <div id="pages-resizer" class="pages-resizer" title="Ajustar ancho"></div>
      </aside>

      <section class="canvas-panel">
        <input id="merge-input" class="hidden-input" type="file" accept="application/pdf" multiple />
        <div class="center-controls">
          <div class="floating-tools">
            <button id="merge-btn" type="button" class="floating-tool-btn" title="Unir PDFs" data-tooltip="Unir PDFs">
              <span class="material-symbols-outlined">layers</span>
            </button>
            <button id="add-image-btn" type="button" class="floating-tool-btn" title="Agregar Imagen" data-tooltip="Agregar Imagen">
              <span class="material-symbols-outlined">image</span>
            </button>
            <button id="add-text-btn" type="button" class="floating-tool-btn" title="Agregar Texto" data-tooltip="Agregar Texto">
              <span class="material-symbols-outlined">text_fields</span>
            </button>
            <button id="add-shape-btn" type="button" class="floating-tool-btn" title="Agregar Objeto" data-tooltip="Agregar Objeto">
              <span class="material-symbols-outlined">category</span>
            </button>
            <button id="delete-object-btn" type="button" class="floating-tool-btn danger" title="Eliminar Seleccion" data-tooltip="Eliminar Seleccion">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
          <section id="shape-popover" class="shape-popover" aria-label="Controles de figuras" hidden>
            <div class="shape-quick-row" role="group" aria-label="Tipos de figura">
              <button type="button" class="shape-kind-btn active" data-shape-kind="rect" title="Rectangulo">
                <span class="material-symbols-outlined">rectangle</span>
              </button>
              <button type="button" class="shape-kind-btn" data-shape-kind="ellipse" title="Circulo">
                <span class="material-symbols-outlined">circle</span>
              </button>
              <button type="button" class="shape-kind-btn" data-shape-kind="triangle" title="Triangulo">
                <span class="material-symbols-outlined">change_history</span>
              </button>
            </div>
            <div class="shape-mini-grid">
              <label class="shape-mini-field">
                <span>Color</span>
                <input id="shape-color-input" type="color" value="#2563eb" />
              </label>
              <label class="shape-mini-field">
                <span>Ancho</span>
                <input id="shape-width-input" type="number" min="20" max="1200" step="1" value="160" />
              </label>
              <label class="shape-mini-field">
                <span>Alto</span>
                <input id="shape-height-input" type="number" min="20" max="1200" step="1" value="110" />
              </label>
              <label id="shape-rounded-wrap" class="shape-mini-check">
                <input id="shape-rounded-input" type="checkbox" checked />
                <span>Redondeado</span>
              </label>
            </div>
            <div class="shape-mini-actions">
              <button id="shape-create-btn" class="ghost-btn" type="button">Crear</button>
              <button id="shape-apply-btn" class="ghost-btn" type="button">Aplicar</button>
            </div>
          </section>
          <div class="viewer-toolbar">
            <button id="undo-btn" type="button" class="ghost-btn icon-ghost-btn" title="Deshacer (Ctrl+Z)">
              <span class="material-symbols-outlined">undo</span>
            </button>
            <button id="redo-btn" type="button" class="ghost-btn icon-ghost-btn" title="Rehacer (Ctrl+Y)">
              <span class="material-symbols-outlined">redo</span>
            </button>
            <button id="prev-page-btn" type="button" class="ghost-btn">Anterior</button>
            <span id="page-indicator">Pagina 1 / 1</span>
            <span id="zoom-indicator" class="zoom-indicator" title="Zoom del lienzo">100%</span>
            <button id="next-page-btn" type="button" class="ghost-btn">Siguiente</button>
          </div>
        </div>
        <div class="canvas-scroll-area">
          <div class="canvas-center-wrap">
            <div id="canvas-stack" class="canvas-stack">
              <canvas id="pdf-canvas" width="595" height="842"></canvas>
              <canvas id="overlay-canvas" width="595" height="842"></canvas>
            </div>
          </div>
        </div>
      </section>

      <aside class="tools-panel">
        <div class="tool-tabs">
          <button id="tab-stamps" class="tab-btn active" type="button">Sellos</button>
        </div>

        <section id="stamps-panel" class="tool-panel active">
          <p class="panel-hint">Importa imagenes y haz clic para aplicarlas en el PDF.</p>
          <input id="stamp-upload-input" class="hidden-input" type="file" accept="image/png,image/jpeg,image/webp" multiple />
          <button id="upload-stamp-btn" class="ghost-btn full-btn" type="button">Importar Imagenes</button>
          <div id="stamp-dropzone" class="stamp-dropzone" role="button" tabindex="0" aria-label="Importar sellos">
            <span class="material-symbols-outlined">upload_file</span>
            <span>Arrastra imagenes aqui o haz clic para importar</span>
          </div>
          <div id="stamp-library" class="stamp-library"></div>
          <div class="dev-support-card">
            <p class="dev-support-title">
              Desarrollado con <span class="dev-heart" aria-hidden="true">❤</span> por
              <a class="dev-author-link" href="https://github.com/Xangel0s" target="_blank" rel="noopener noreferrer">Xangel0s</a>
            </p>
            <p class="dev-support-sub">Apoya el repositorio <span aria-hidden="true">★</span></p>
            <a class="dev-support-link muted" href="https://github.com/Xangel0s/PDFling_Kit" target="_blank" rel="noopener noreferrer">github.com/Xangel0s/PDFling_Kit</a>
          </div>
        </section>
      </aside>
    </main>

    <p id="workspace-status" aria-live="polite"></p>
    <script src="workspace.js"></script>
  </body>
</html>
